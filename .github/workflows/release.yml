name: Release

on:
  push:
    tags: ['*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish a GitHub release for'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    steps:
      # no explicit ref: a tag push checks out the tag, a manual dispatch
      # checks out the branch it was dispatched on, so the notes file can be
      # newer than the tag it describes
      - uses: actions/checkout@v4
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          # release notes live in the repo, fall back to the auto-generated ones
          notes=".github/release-notes/${TAG}.md"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 ; then
            if [ -f "$notes" ] ; then
              echo "Release $TAG already exists, syncing notes from ${notes}"
              gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --notes-file "$notes"
            else
              echo "Release $TAG already exists, nothing to do"
            fi
            exit 0
          fi
          if [ -f "$notes" ] ; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --verify-tag --title "$TAG" --notes-file "$notes"
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --verify-tag --title "$TAG" --generate-notes
          fi
