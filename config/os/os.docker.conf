# Rename to os.conf to enable this file
################################################################################

# Docker container based on the official clamav/clamav image

clam_user="clamav"
clam_group="clamav"

clam_dbs="/var/lib/clamav"

work_dir="/var/lib/clamav-unofficial-sigs"

# Log to stdout (docker logs), not to files
logging_enabled="no"
log_file_path="/var/log/clamav-unofficial-sigs"

# The official clamav image listens on /tmp/clamd.sock
clamd_socket="/tmp/clamd.sock"

clamd_reload_opt="clamdscan --reload"

# The container entrypoint enables reloads in all-in-one mode,
# in updater (sidecar) mode there is no local clamd to reload
reload_dbs="no"

# The container image is immutable, update by pulling a new image
allow_upgrades="no"
allow_update_checks="no"

