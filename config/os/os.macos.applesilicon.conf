# macOS on Apple Silicon (M1 and newer) with clamav installed via homebrew
# Homebrew prefix on Apple Silicon is /opt/homebrew

# Requires gnu-sed (gsed)

# Follow the installation Instructions: see the guide in the guides folder

clam_user="clamav"

# On some systems the clamgroup is "virusgroup"
clam_group="clamav"

clam_dbs="/opt/homebrew/var/clamav/db"

clamd_pid="/opt/homebrew/var/clamav/run/clamd.pid"

clamscan_bin="/opt/homebrew/bin/clamscan"

work_dir="/opt/homebrew/var/clamav-unofficial-sigs"

log_file_path="/opt/homebrew/var/clamav/log"

clamd_restart_opt="launchctl kickstart -k system/clamav.clamd"

#clamd_socket="/tmp/clamd.socket"

#gpg_bin="/opt/homebrew/bin/gpg"

enable_gpg="no"

